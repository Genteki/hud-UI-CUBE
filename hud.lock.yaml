tools:
- name: computer
  description: Control computer with mouse, keyboard, and screenshots
  inputSchema:
    $defs:
      Coordinate:
        description: 'A coordinate point with x and y values.


          Used for path-based actions like drag operations.'
        properties:
          x:
            description: X coordinate
            type: integer
          y:
            description: Y coordinate
            type: integer
        required:
        - x
        - y
        type: object
    properties:
      action:
        description: The action name (click, press, write, move, etc.)
        enum:
        - click
        - press
        - keydown
        - keyup
        - write
        - scroll
        - move
        - wait
        - drag
        - response
        - screenshot
        - position
        - hold_key
        - mouse_down
        - mouse_up
        type: string
      x:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        description: X coordinate for click/move/scroll actions
      y:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        description: Y coordinate for click/move/scroll actions
      button:
        anyOf:
        - enum:
          - left
          - right
          - middle
          - back
          - forward
          type: string
        - type: 'null'
        default: null
        description: Mouse button for click actions
      pattern:
        anyOf:
        - items:
            type: integer
          type: array
        - type: 'null'
        default: null
        description: Click pattern for multi-clicks (e.g., [100] for double-click)
      text:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Text for write/response actions
      keys:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        description: Keys for press/keydown/keyup actions
      enter_after:
        anyOf:
        - type: boolean
        - type: 'null'
        default: null
        description: Whether to press Enter after typing
      scroll_x:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        description: Horizontal scroll amount (positive = right)
      scroll_y:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        description: Vertical scroll amount (positive = down)
      offset_x:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        description: X offset for relative move
      offset_y:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        description: Y offset for relative move
      path:
        anyOf:
        - items:
            $ref: '#/$defs/Coordinate'
          type: array
        - type: 'null'
        default: null
        description: Path for drag actions as list of {x, y} coordinates
      time:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        description: Time in milliseconds for wait action
      hold_keys:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        description: Keys to hold during action
      duration:
        anyOf:
        - type: number
        - type: 'null'
        default: null
        description: Duration in seconds for hold_key action
    required:
    - action
    type: object
