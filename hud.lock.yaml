- name: qwen_computer
  description: 'Use a mouse and keyboard to interact with a computer, and take screenshots.

    * This is an interface to a desktop GUI. You do not have access to a terminal
    or

    applications menu. You must click on desktop icons to start applications.

    * Some applications may take time to start or process actions, so you may need
    to

    wait and take successive screenshots to see the results of your actions. E.g.
    if you

    click on Firefox and a window doesn''t open, try wait and taking another screenshot.

    * The screen''s resolution is 700x448.

    * Whenever you intend to move the cursor to click on an element like an icon,
    you

    should consult a screenshot to determine the coordinates of the element before

    moving the cursor.

    * If you tried clicking on a program or link but it failed to load, even after

    waiting, try adjusting your cursor position so that the tip of the cursor visually

    falls on the element that you want to click.

    * Make sure to click any buttons, links, icons, etc with the cursor tip in the

    center of the element. Don''t click boxes on their edges.'
  inputSchema:
    properties:
      action:
        description: The action to perform on the computer
        type: string
      keys:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        description: Keys for key action
      text:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Text to type
      coordinate:
        anyOf:
        - items:
            type: integer
          type: array
        - type: 'null'
        default: null
        description: The coordinate to interact with on the computer [x, y]
      pixels:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
        description: Pixels to scroll
      time:
        anyOf:
        - type: number
        - type: 'null'
        default: null
        description: Time to wait in seconds
      status:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: Status for terminate action
    required:
    - action
    type: object
prompts:
- name: ui-cube:combo-box-tasks--1
  description: '[Setup] Scenario: combo-box-tasks--1'
  arguments:
  - name: ques
    required: false
    description: null
    default: Replace all emails with just "all-hands@company.com", hit enter to save.
    type: string
  - name: ux_hint
    required: false
    description: null
    default: "Click \xD7 to remove emails, type and press Enter to add"
    type: string
  - name: web_url
    required: false
    description: null
    default: http://74.234.189.120:3001/combo-box-tasks/1?mode=test
    type: string
  meta:
    code: "        @env.scenario(task_id)\n        async def _scenario(ques=ques,\
      \ ux_hint=ux_hint, web_url=web_url):\n            from env import persistent_ctx\n\
      \n            tool = persistent_ctx.playwright_tool if persistent_ctx else None\n\
      \            if not tool:\n                logger.warning(\"No playwright tool;\
      \ cannot run task %s\", task_id)\n                yield 0.0\n              \
      \  return\n\n            # Navigate to the task URL\n            if web_url:\n\
      \                await navigate_to_url(tool, web_url)\n\n            # Build\
      \ prompt\n            parts = [ques]\n            if ux_hint:\n            \
      \    parts.append(f\"\\nHint: {ux_hint}\")\n            if web_url:\n      \
      \          parts.append(f\"\\nURL: {web_url}\")\n            prompt = \"\\n\"\
      .join(parts)\n\n            _ = yield prompt\n\n            # Verification:\
      \ check for UI-CUBE success marker in DOM\n            try:\n              \
      \  if tool.page:\n                    html = await tool.page.content()\n   \
      \                 success = \">code#1</\" in html\n                    yield\
      \ 1.0 if success else 0.0\n                else:\n                    yield\
      \ 0.0\n            except Exception as exc:\n                logger.error(\"\
      Verification failed for %s: %s\", task_id, exc)\n                yield 0.0\n"
    arguments:
    - name: ques
      required: false
      default: Replace all emails with just "all-hands@company.com", hit enter to
        save.
      type: string
    - name: ux_hint
      required: false
      default: "Click \xD7 to remove emails, type and press Enter to add"
      type: string
    - name: web_url
      required: false
      default: http://74.234.189.120:3001/combo-box-tasks/1?mode=test
      type: string
    _fastmcp:
      tags: []
